name: School Notice Crawler

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions cron은 UTC 기준
    # KST 08:00 = UTC 23:00
    # KST 12:00 = UTC 03:00
    # KST 18:00 = UTC 09:00
    - cron: "0 23 * * *"
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest

    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      INIT_MODE: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler/requirements.txt

      - name: Create Firebase service account file
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          secret = os.environ["FIREBASE_SERVICE_ACCOUNT_JSON"]
          Path("crawler/firebase-service-account.json").write_text(secret, encoding="utf-8")
          PY

      - name: Run crawler
        run: |
          cd crawler
          python crawler.py
